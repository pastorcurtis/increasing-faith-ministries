# =============================================================================
# IFM Monthly Newsletter Generator
# =============================================================================
#
# Automatically generates and sends the Increasing Faith Ministries monthly
# newsletter on the 1st of every month at 9:00 AM EST.
#
# REQUIRED SECRETS (configure in GitHub repo Settings > Secrets > Actions):
#   - GROQ_API_KEY          : API key from https://console.groq.com
#   - RESEND_API_KEY         : API key from https://resend.com
#   - NETLIFY_ACCESS_TOKEN   : Personal access token from https://app.netlify.com/user/applications
#   - NETLIFY_SITE_ID        : Your Netlify site ID (found in Site Settings > General)
#
# FAILURE HANDLING:
#   If any step fails, a GitHub Issue is automatically created so failures
#   are never silent. Check the Actions tab and Issues for diagnostics.
#
# =============================================================================
name: Monthly Newsletter

on:
  schedule:
    # 1st of every month at 9:00 AM EST (14:00 UTC)
    - cron: '0 14 1 * *'
  workflow_dispatch:
    inputs:
      month:
        description: 'Month number (1-12). Leave empty for current month.'
        required: false
        type: string
      year:
        description: 'Year (e.g. 2026). Leave empty for current year.'
        required: false
        type: string
      send_emails:
        description: 'Send emails to subscribers?'
        required: false
        type: boolean
        default: true

concurrency:
  group: newsletter
  cancel-in-progress: false

jobs:
  generate-and-send:
    name: Generate & Send Newsletter
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      NETLIFY_ACCESS_TOKEN: ${{ secrets.NETLIFY_ACCESS_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

    steps:
      # -- Validate secrets early (fail fast) --
      - name: Validate required secrets
        run: |
          MISSING=""
          if [ -z "$GROQ_API_KEY" ]; then MISSING="$MISSING GROQ_API_KEY"; fi
          if [ -z "$RESEND_API_KEY" ]; then MISSING="$MISSING RESEND_API_KEY"; fi
          if [ -z "$NETLIFY_ACCESS_TOKEN" ]; then MISSING="$MISSING NETLIFY_ACCESS_TOKEN"; fi
          if [ -z "$NETLIFY_SITE_ID" ]; then MISSING="$MISSING NETLIFY_SITE_ID"; fi
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING"
            echo "Configure these in Settings > Secrets > Actions"
            exit 1
          fi
          echo "All required secrets are configured."

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install newsletter-agent dependencies
        working-directory: newsletter-agent
        run: npm install

      # -- Generate newsletter content via AI --
      - name: Generate newsletter
        id: generate
        working-directory: newsletter-agent
        run: |
          ARGS=""
          if [ -n "${{ inputs.month }}" ]; then ARGS="$ARGS --month ${{ inputs.month }}"; fi
          if [ -n "${{ inputs.year }}" ]; then ARGS="$ARGS --year ${{ inputs.year }}"; fi
          echo "Running: node index.js $ARGS"
          node index.js $ARGS

      # -- Commit generated files --
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit generated newsletter
        run: |
          git add content/newsletters/
          git diff --staged --quiet || git commit -m "Add monthly newsletter for $(date +'%B %Y')"

      - name: Push changes to main
        run: git push origin main

      # -- Send emails to subscribers --
      - name: Send newsletter to subscribers
        id: send
        if: inputs.send_emails != false
        continue-on-error: true
        working-directory: newsletter-agent
        run: node send-newsletter.js

      # -- Status report --
      - name: Report status
        if: always()
        run: |
          echo "========================================"
          echo "  NEWSLETTER PIPELINE STATUS"
          echo "========================================"
          echo "  Generate: ${{ steps.generate.outcome }}"
          echo "  Send:     ${{ steps.send.outcome || 'skipped' }}"
          echo "========================================"
          if [ "${{ steps.send.outcome }}" == "failure" ]; then
            echo "::warning::Newsletter generated and committed, but email sending failed."
          fi

      # -- Auto-create issue on pipeline failure --
      - name: Create failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const month = new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Newsletter pipeline failed - ${month}`,
              body: `## Newsletter Pipeline Failure\n\n**Run:** [View logs](${runUrl})\n**Trigger:** ${context.eventName}\n**Time:** ${new Date().toISOString()}\n\n### Common fixes\n- **API key expired**: Update GROQ_API_KEY in Settings > Secrets\n- **Rate limited**: Re-run manually from Actions tab\n- **Netlify token expired**: Update NETLIFY_ACCESS_TOKEN\n\nOnce fixed, go to Actions > Monthly Newsletter > Run workflow`,
              labels: ['bug', 'newsletter']
            });

      # -- Auto-create issue on email failure --
      - name: Create email failure issue
        if: steps.send.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const month = new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Newsletter email sending failed - ${month}`,
              body: `## Email Sending Failed\n\nThe newsletter was **generated and committed**, but email delivery failed.\n\n**Run:** [View logs](${runUrl})\n\n### Common fixes\n- **Resend API key expired**: Update RESEND_API_KEY in Secrets\n- **Domain verification lost**: Check resend.com dashboard\n- You can manually send: cd newsletter-agent && node send-newsletter.js`,
              labels: ['bug', 'newsletter']
            });
