name: Daily Social Media

on:
  schedule:
    # 9 AM EST (2 PM UTC) every day
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      day_override:
        description: 'Force day of week (0=Sun, 6=Sat). Leave empty for today.'
        required: false
      preview_only:
        description: 'Preview only (do not post)'
        type: boolean
        default: false
      skip_facebook:
        description: 'Skip Facebook posting'
        type: boolean
        default: false
      skip_x:
        description: 'Skip X (Twitter) posting'
        type: boolean
        default: false

permissions:
  issues: write
  contents: write

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # -- Validate secrets early --
      - name: Validate secrets
        run: |
          MISSING=""
          if [ -z "${{ secrets.GROQ_API_KEY }}" ]; then MISSING="$MISSING GROQ_API_KEY"; fi
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING"
            exit 1
          fi
          echo "Required secrets present"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: social-agent
        run: npm install

      # -- Generate content --
      - name: Generate social media content
        id: generate
        working-directory: social-agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.day_override }}" != "" ]; then
            ARGS="$ARGS --day ${{ github.event.inputs.day_override }}"
          fi
          if [ "${{ github.event.inputs.preview_only }}" = "true" ]; then
            ARGS="$ARGS --preview"
          fi
          node index.js $ARGS

      # -- Post to platforms --
      - name: Post to social media
        if: ${{ github.event.inputs.preview_only != 'true' }}
        id: post
        working-directory: social-agent
        env:
          FACEBOOK_PAGE_TOKEN: ${{ secrets.FACEBOOK_PAGE_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: node poster.js

      # -- Commit generated content to archive --
      - name: Commit social content archive
        if: ${{ github.event.inputs.preview_only != 'true' }}
        run: |
          git config user.name "IFM Social Agent"
          git config user.email "social-agent@increasingfaith.net"
          git add content/social-posts/ content/social-archive/ || true
          if git diff --staged --quiet; then
            echo "No new content to commit"
          else
            DATE=$(date +%Y-%m-%d)
            git commit -m "Social media content for $DATE"
            git push
          fi

      # -- Alert on failure --
      - name: Create failure alert
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Social Media Agent failed - ${date}`,
              body: [
                '## Social Media Pipeline Failure',
                '',
                `**Date:** ${date}`,
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                'The daily social media content generation or posting failed.',
                'Check the workflow run for details.',
                '',
                '*Auto-generated by Social Media Agent*'
              ].join('\n'),
              labels: ['social-media', 'automated']
            });
